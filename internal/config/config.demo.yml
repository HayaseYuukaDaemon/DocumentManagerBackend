addr: ":8080"
log_level: "info"
default_storage: "memory"
document_store: "sqlite"
sqlite_path: "document-archive.db"
deleted_sweep_interval: "24h"
allow_cors: []
storages:
  memory:
    type: "memory"
  minio:
    type: "s3"
    s3:
      internal_endpoint: ""
      endpoint: "http://127.0.0.1:9000"
      bucket: "archive"
      region: "us-east-1"
      access_key_id: "minioadmin"
      secret_access_key: "minioadmin"
      session_token: ""
      use_path_style: true
role:
  "admin-token":
    name: "admin"
    admin: true
  "contributor-token":
    name: "contributor"
    permissions:
      - "document:create"
      - "document:read"
  "viewer-token":
    name: "viewer"
    permissions:
      - "document:read"
